<section id="contact" class="contact">
    <div class="container">
        <h2 class="section-title" data-i18n="contact.title">Get In Touch</h2>
        <div class="contact-content">
            <div class="contact-info">
                <div class="contact-item">
                    <div class="contact-icon"><i class="fas fa-map-marker-alt"></i></div>
                    <div>
                        <h3 data-i18n="contact.location.title">Location</h3>
                        <p data-i18n="contact.location.value">Lat Krabang, Bangkok, Thailand</p>
                    </div>
                </div>
                <div class="contact-item">
                    <div class="contact-icon"><i class="fas fa-envelope"></i></div>
                    <div>
                        <h3 data-i18n="contact.email.title">Email</h3>
                        <p>kelvinwai.khantphyo@gmail.com</p>
                    </div>
                </div>
                <div class="contact-item">
                    <div class="contact-icon"><i class="fas fa-phone"></i></div>
                    <div>
                        <h3 data-i18n="contact.phone.title">Phone</h3>
                        <p>+66920910228</p>
                    </div>
                </div>
                <div class="contact-social">
                    <h3>Connect with me</h3>
                    <div class="social-links">
                        <a href="https://github.com/DolphinsAreWeird" target="_blank"><i class="fab fa-github"></i></a>
                        <a href="https://www.linkedin.com/in/khant-phyo-wai/" target="_blank"><i class="fab fa-linkedin-in"></i></a>
                        <a href="https://www.facebook.com/profile.php?id=100025576650913" target="_blank"><i class="fab fa-facebook-f"></i></a>
                        <a href="https://www.instagram.com/khant_p_wai/" target="_blank"><i class="fab fa-instagram"></i></a>
                    </div>
                </div>
            </div>

            <form id="contact-form" class="contact-form">
                <div class="form-group">
                    <input type="text" id="name" name="name" placeholder="Your Name" required data-i18n-placeholder="contact.form.name">
                </div>
                <div class="form-group">
                    <input type="email" id="email" name="email" placeholder="Your Email" required data-i18n-placeholder="contact.form.email">
                </div>
                <div class="form-group">
                    <input type="text" id="subject" name="subject" placeholder="Subject" data-i18n-placeholder="contact.form.subject">
                </div>
                <div class="form-group">
                    <textarea id="message" name="message" placeholder="Your Message" required data-i18n-placeholder="contact.form.message"></textarea>
                </div>
                <button type="submit" class="btn btn-primary" data-i18n="contact.form.submit">Send Message</button>
                <div id="form-status"></div>
            </form>
        </div>
    </div>
</section>
